Name: 加速版构建 6.6.89 欧加真OKI内核

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  KERNEL_NAME: ''
  CCACHE_DIR: "/home/runner/.ccache_6.6.89"
  CCACHE_MAXSIZE: "3G"

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU Type'
        required: true
        type: choice
        default: 'sukisu'
        options:
          - 'sukisu'
          - 'ksunext'
          - 'mksu'
          - 'ksu'
      susfs_enable:
        description: 'Enable SUSFS'
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        description: 'Enable KPM (SukiSU Only)'
        required: true
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'
      lz4_enable:
        description: 'Enable LZ4 & ZSTD Patch'
        required: true
        type: boolean
        default: 'true'
      lz4kd_enable:
        description: 'Enable LZ4KD Patch'
        required: true
        type: boolean
        default: 'true'
      bbr_enable:
        description: "Enable BBR"
        required: true
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: 'Enable Better Net Configs'
        required: true
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'
      adios_enable:
        description: 'Enable ADIOS Scheduler'
        required: true
        type: boolean
        default: 'true'
      rekernel_enable:
        description: 'Enable Re-Kernel'
        required: true
        type: boolean
        default: 'true'
      baseband_guard:
        description: 'Enable Baseband Guard'
        required: true
        type: boolean
        default: 'true'
      kernel_suffix:
        description: 'Kernel Suffix'
        required: false
        type: string
        default: '🌈'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
    steps:
      - name: Setup Environment
        run: |
          rm -rf kernel_workspace && mkdir kernel_workspace && cd kernel_workspace
          sudo apt-mark hold firefox libc-bin
          sudo apt purge man-db
          sudo rm -rf /var/lib/man-db/auto-update
          sudo apt update
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache aria2 zip unzip

          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip
          unzip -q common.zip
          mv "android_kernel_common_oneplus_sm8750-oneplus-sm8750_v_16.0.0_oneplus_13_6.6.89" common
          rm -rf common.zip

          mkdir -p clang18
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip
          unzip -q clang.zip -d clang18
          rm -rf clang.zip

          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip
          rm -rf build-tools.zip

          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: Setup CCache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-neov4-6.6.89-${{ runner.os }}-main
          restore-keys: |
            ccache-neov4-6.6.89-${{ runner.os }}-
            ccache-neov4-6.6.89-

      - name: Configure CCache
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          mkdir -p "${{ env.CCACHE_DIR }}"
          ccache -M "${{ env.CCACHE_MAXSIZE }}"
          ccache -o compression=true

      - name: Setup KernelSU
        id: ksu_version
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s miuix
            cd ./KernelSU
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            KSU_API_VERSION=$(grep -m1 "KSU_VERSION_API :=" kernel/Kbuild | awk -F'= ' '{print $2}' | tr -d '[:space:]' || echo "3.1.7")
            echo "KSU_API_VERSION=$KSU_API_VERSION" >> $GITHUB_ENV
            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'-🌸\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := v'"$KSU_API_VERSION"$'-'"$GIT_COMMIT_HASH"$'-🌸'
            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Kbuild
            sed -i '/KSU_VERSION_API :=/d' kernel/Kbuild
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Kbuild
            awk -v def="$VERSION_DEFINITIONS" '/REPO_OWNER :=/ {print; print def; inserted=1; next} 1 END {if (!inserted) print def}' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild
            KSU_VERSION=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/next-susfs/kernel/setup.sh" | bash -s next-susfs
            cd KernelSU-Next
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/pershoot/KernelSU-Next/commits?sha=next&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 10200)
            sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile
            cd ../common/drivers/kernelsu
            wget https://github.com/WildKernels/kernel_patches/raw/refs/heads/main/next/susfs_fix_patches/v1.5.12/fix_apk_sign.c.patch
            patch -p2 -N -F 3 < fix_apk_sign.c.patch || true
          elif [[ ${{ github.event.inputs.ksu_type }} == "mksu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/5ec1cff/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/5ec1cff/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          else
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/tiann/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          fi
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT

      - name: Apply Patches (KSU & SUSFS)
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            cp ./SukiSU_patch/69_hide_stuff.patch ./common/
            cd ./common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            patch -p1 < 69_hide_stuff.patch || true
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            cd susfs4ksu && git checkout f450ec00bf592d080f59b01ff6f9242456c9a427 && cd ..
            git clone https://github.com/WildKernels/kernel_patches.git
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            cp ./kernel_patches/next/scope_min_manual_hooks_v1.5.patch ./common/
            cp ./kernel_patches/69_hide_stuff.patch ./common/
            cd ./common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            patch -p1 -N -F 3 < scope_min_manual_hooks_v1.5.patch || true
            patch -p1 -N -F 3 < 69_hide_stuff.patch || true
          else
            cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
            sed -i 's|kernel/Makefile|kernel/Kbuild|g' "./KernelSU/10_enable_susfs_for_ksu.patch" || true
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            cp ./SukiSU_patch/69_hide_stuff.patch ./common/
            cd ./KernelSU
            patch -p1 < 10_enable_susfs_for_ksu.patch || true
            wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/fix_umount.patch
            patch -p1 < fix_umount.patch || true
            if [[ ${{ github.event.inputs.ksu_type }} == "mksu" ]]; then
               wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/mksu_supercalls.patch
               patch -p1 < mksu_supercalls.patch || true
            fi
            cd ../common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            patch -p1 -N -F 3 < 69_hide_stuff.patch || true
          fi

      - name: Apply Patches (LZ4/ZSTD/LZ4KD)
        run: |
          cd kernel_workspace
          if [[ "${{ github.event.inputs.lz4_enable }}" == "true" ]]; then
            git clone https://github.com/cctv18/oppo_oplus_realme_sm8750.git
            cp ./oppo_oplus_realme_sm8750/zram_patch/001-lz4.patch ./common/
            cp ./oppo_oplus_realme_sm8750/zram_patch/lz4armv8.S ./common/lib
            cp ./oppo_oplus_realme_sm8750/zram_patch/002-zstd.patch ./common/
            cd common
            git apply -p1 < 001-lz4.patch || true
            patch -p1 < 002-zstd.patch || true
            cd ..
          fi
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            [ ! -d "SukiSU_patch" ] && git clone https://github.com/ShirkNeko/SukiSU_patch.git
            cd common
            cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
            cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./lib
            cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto
            cp ../SukiSU_patch/other/zram/zram_patch/${{ env.KERNEL_VERSION }}/lz4kd.patch ./
            patch -p1 -F 3 < lz4kd.patch || true
          fi

      - name: Configure Kernel (Kconfig)
        run: |
          cd kernel_workspace/common
          CONFIG_PATH="arch/arm64/configs/gki_defconfig"
          
          # Basic Configs
          echo "CONFIG_KSU=y" >> $CONFIG_PATH
          sed -i 's/check_defconfig//' build.config.gki
          echo "CONFIG_HEADERS_INSTALL=n" >> $CONFIG_PATH
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> $CONFIG_PATH
          echo "CONFIG_TMPFS_XATTR=y" >> $CONFIG_PATH
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> $CONFIG_PATH

          # SUSFS Configs
          if [[ "${{ github.event.inputs.susfs_enable }}" == "true" ]]; then
            echo "CONFIG_KSU_SUSFS=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $CONFIG_PATH
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $CONFIG_PATH
          else
            echo "CONFIG_KSU_SUSFS=n" >> $CONFIG_PATH
          fi

          # KPM Config
          if [[ ${{ github.event.inputs.kpm_enable }} == 'true' && ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            echo "CONFIG_KPM=y" >> $CONFIG_PATH
          fi

          # LZ4KD Configs
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            echo "CONFIG_ZSMALLOC=y" >> $CONFIG_PATH
            echo "CONFIG_CRYPTO_LZ4HC=y" >> $CONFIG_PATH
            echo "CONFIG_CRYPTO_LZ4K=y" >> $CONFIG_PATH
            echo "CONFIG_CRYPTO_LZ4KD=y" >> $CONFIG_PATH
            echo "CONFIG_CRYPTO_842=y" >> $CONFIG_PATH
          fi

          # Network Configs
          if [[ "${{ github.event.inputs.better_net }}" == "true" ]]; then
            echo "CONFIG_BPF_STREAM_PARSER=y" >> $CONFIG_PATH
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> $CONFIG_PATH
            echo "CONFIG_NETFILTER_XT_SET=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_MAX=65534" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_BITMAP_IP=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_BITMAP_PORT=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_IP=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_IPMARK=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_IPPORT=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_IPMAC=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_MAC=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_NET=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_NETNET=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_NETPORT=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> $CONFIG_PATH
            echo "CONFIG_IP_SET_LIST_SET=y" >> $CONFIG_PATH
            echo "CONFIG_IP6_NF_NAT=y" >> $CONFIG_PATH
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y" >> $CONFIG_PATH
            wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/config.patch
            patch -p1 -F 3 < config.patch || true
          fi

          # TCP/BBR Configs
          if [[ "${{ github.event.inputs.bbr_enable }}" != "false" ]]; then
            echo "CONFIG_TCP_CONG_ADVANCED=y" >> $CONFIG_PATH
            echo "CONFIG_TCP_CONG_BBR=y" >> $CONFIG_PATH
            echo "CONFIG_TCP_CONG_CUBIC=y" >> $CONFIG_PATH
            echo "CONFIG_TCP_CONG_VEGAS=y" >> $CONFIG_PATH
            echo "CONFIG_TCP_CONG_NV=y" >> $CONFIG_PATH
            echo "CONFIG_TCP_CONG_WESTWOOD=y" >> $CONFIG_PATH
            echo "CONFIG_TCP_CONG_HTCP=y" >> $CONFIG_PATH
            echo "CONFIG_TCP_CONG_BRUTAL=y" >> $CONFIG_PATH
            if [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
              echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> $CONFIG_PATH
            else
              echo "CONFIG_DEFAULT_TCP_CONG=cubic" >> $CONFIG_PATH
            fi
          fi

          # ADIOS
          if [[ "${{ github.event.inputs.adios_enable }}" == "true" ]]; then
            echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> $CONFIG_PATH
            echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y" >> $CONFIG_PATH
          fi

          # Re-Kernel
          if [[ "${{ github.event.inputs.rekernel_enable }}" == "true" ]]; then
            echo "CONFIG_REKERNEL=y" >> $CONFIG_PATH
          fi

          # Baseband Guard
          if [[ "${{ github.event.inputs.baseband_guard }}" == "true" ]]; then
             echo "CONFIG_BBG=y" >> $CONFIG_PATH
             cd security
             wget https://github.com/cctv18/Baseband-guard/archive/refs/heads/master.zip && unzip -q master.zip && mv "Baseband-guard-master" baseband-guard && rm master.zip
             printf '\nobj-$(CONFIG_BBG) += baseband-guard/\n' >> ./Makefile
             sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' ./Kconfig
             # Simplified Kconfig injection
             awk '/endmenu/ { last=NR } { l[NR]=$0 } END { for(i=1;i<=NR;i++) { if(i==last) { sub(/endmenu/,"",l[i]); print l[i] "source \"security/baseband-guard/Kconfig\"\n\nendmenu" } else print l[i] } }' ./Kconfig > Kconfig.tmp && mv Kconfig.tmp ./Kconfig
             sed -i 's/selinuxfs.o //g; s/hooks.o //g' "./selinux/Makefile"
             cat "./baseband-guard/sepatch.txt" >> "./selinux/Makefile"
             cd ..
          fi

          # Local Version
          SUFFIX="${{ github.event.inputs.kernel_suffix }}"
          [ -z "$SUFFIX" ] && SUFFIX="${{ env.KERNEL_NAME }}"
          sed -i "\$s|echo \"\\\$res\"|echo \"-$SUFFIX\"|" scripts/setlocalversion
          sed -i "s/-4k/-$SUFFIX/g" $CONFIG_PATH
          sed -i 's/${scm_version}//' scripts/setlocalversion
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $CONFIG_PATH

      - name: Build Kernel
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "${{ env.CCACHE_DIR }}/ccache.conf"
          
          cd kernel_workspace/common
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfakestat.so
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfaketimeMT.so
          chmod 777 ./*.so
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          export LD_PRELOAD="$(pwd)/libfakestat.so $(pwd)/libfaketimeMT.so"
          
          # Simplified Wrappers
          echo -e '#!/bin/bash\nexport LD_PRELOAD="'$LD_PRELOAD'"\nexport FAKESTAT="'$FAKESTAT'"\nexport FAKETIME="'$FAKETIME'"\nccache clang "$@"' > cc-wrapper
          echo -e '#!/bin/bash\nexport LD_PRELOAD="'$LD_PRELOAD'"\nexport FAKESTAT="'$FAKESTAT'"\nexport FAKETIME="'$FAKETIME'"\nld.lld "$@"' > ld-wrapper
          chmod +x cc-wrapper ld-wrapper

          # Clean up junk
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL &
          
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image

      - name: Patch Kernel (KPM)
        run: |
          if [[ ${{ github.event.inputs.kpm_enable }} == 'true' && ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            cd kernel_workspace/common/out/arch/arm64/boot
            curl -LO https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/latest/download/patch_linux
            chmod +x patch_linux
            ./patch_linux
            mv oImage Image
          fi

      - name: Package AnyKernel3
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cp common/out/arch/arm64/boot/Image AnyKernel3/Image
          
          [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]] && TYPE="SukiSU"
          [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]] && TYPE="KSUNext"
          [[ ${{ github.event.inputs.ksu_type }} == "mksu" ]] && TYPE="MKSU"
          [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]] && TYPE="KSU"
          
          [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]] && wget https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/refs/heads/main/zram.zip -P AnyKernel3
          
          SUFFIX="${{ github.event.inputs.kernel_suffix }}"
          [ -z "$SUFFIX" ] && SUFFIX="${{ env.KERNEL_NAME }}"
          cd AnyKernel3
          zip -r "../AnyKernel3_${TYPE}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_A15_${SUFFIX}.zip" ./*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_ZIP
          path: kernel_workspace/AnyKernel*.zip
