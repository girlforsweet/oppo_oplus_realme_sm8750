name: 加速版构建 6.6.89 欧加真OKI内核

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  KERNEL_NAME: ''

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(SukiSU Ultra/ReSukiSU/KernelSU Next/MKSU/KSU(原版)/无内置KSU,默认SukiSU Ultra)'
        required: true
        type: choice
        default: 'sukisu'
        options:
          - 'sukisu'
          - 'resukisu'
          - 'ksunext'
          - 'mksu'
          - 'ksu'
          - 'none'
      custom_ksu_version:
        description: '🔢 自定义 SukiSU 数字版本号'
        required: false
        default: ''
      custom_ksu_version_full:
        description: '📝 自定义 SukiSU 完整版本字符串'
        required: false
        default: ''
      susfs_enable:
        description: '是否开启susfs'
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        description: '是否开启kpm'
        required: true
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: '是否安装 lz4 补丁'
        required: true
        type: boolean
        default: 'true'
      lz4kd_enable:
        description: '是否安装 LZ4KD 补丁'
        required: true
        type: boolean
        default: 'true'
      bbr_enable:
        description: "是否启用bbr算法"
        required: true
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: '是否开启网络功能拓展配置'
        required: true
        type: boolean
        default: 'true'
      adios_enable:
        description: '是否启用ADIOS IO调度器'
        required: true
        type: boolean
        default: 'true'
      rekernel_enable:
        description: '是否启用Re-Kernel支持'
        required: true
        type: boolean
        default: 'true'
      baseband_guard:
        description: '是否开启内核级基带保护'
        required: true
        type: boolean
        default: 'true'
      ccache_debug:
        description: '是否上传 Ccache调试日志'
        required: true
        type: boolean
        default: 'false'
      kernel_suffix:
        description: '自定义篡改版本号后缀 (例如: my-custom-v1)'
        required: false
        type: string
        default: '🌈'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
    steps:
      - name: 安装环境依赖+初始化源码仓库及llvm-Clang18工具链
        run: |
          [span_0](start_span)rm -rf kernel_workspace[span_0](end_span)
          [span_1](start_span)mkdir kernel_workspace[span_1](end_span)
          [span_2](start_span)cd kernel_workspace[span_2](end_span)
          
          [span_3](start_span)sudo apt-mark hold firefox && sudo apt-mark hold libc-bin && sudo apt purge man-db && sudo rm -rf /var/lib/man-db/auto-update &&[span_3](end_span)
          [span_4](start_span)sudo apt update && sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache &[span_4](end_span)
          
          echo "正在克隆源码仓库..."
          [span_5](start_span)aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip &&[span_5](end_span)
          [span_6](start_span)unzip -q common.zip && mv "android_kernel_common_oneplus_sm8750-oneplus-sm8750_v_16.0.0_oneplus_13_6.6.89" common && rm -rf common.zip &[span_6](end_span)
          
          [span_7](start_span)echo "正在克隆llvm-clang18工具链..." && mkdir -p clang18 &&[span_7](end_span)
          [span_8](start_span)aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip &&[span_8](end_span)
          [span_9](start_span)unzip -q clang.zip -d clang18 && rm -rf clang.zip &[span_9](end_span)
          
          [span_10](start_span)echo "正在克隆构建工具..." &&[span_10](end_span)
          [span_11](start_span)aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip &&[span_11](end_span)
          [span_12](start_span)unzip -q build-tools.zip && rm -rf build-tools.zip &[span_12](end_span)
          
          wait
          echo "所有源码及llvm-Clang18工具链初始化完成！"
          
          echo "正在彻底篡改版本号控制脚本..."
          [span_13](start_span)rm common/android/abi_gki_protected_exports_* || true[span_13](end_span)
          # 强制清空 setlocalversion 的所有自动检测逻辑，只保留输出
          echo '#!/bin/sh' > common/scripts/setlocalversion
          echo 'echo "-${1:-${KERNEL_SUFFIX}}"' >> common/scripts/setlocalversion
          chmod +x common/scripts/setlocalversion

      - name: 配置ccache目录
        run: |
          [span_14](start_span)echo "CCACHE_DIR=$HOME/.ccache_6.6.89" >> $GITHUB_ENV[span_14](end_span)
          [span_15](start_span)echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV[span_15](end_span)

      - name: 载入当前版本内核的 ccache缓存
        uses: actions/cache@v4
        id: ccache-restore
        with:
          [span_16](start_span)path: ${{ env.CCACHE_DIR }}[span_16](end_span)
          [span_17](start_span)key: ccache-neov4-6.6.89-${{ runner.os }}-main[span_17](end_span)
          restore-keys: |
            [span_18](start_span)ccache-neov4-6.6.89-${{ runner.os }}-[span_18](end_span)
      
      - name: 初始化并配置ccache
        run: |
          [span_19](start_span)export CCACHE_DIR="${{ env.CCACHE_DIR }}"[span_19](end_span)
          [span_20](start_span)mkdir -p "$CCACHE_DIR"[span_20](end_span)
          [span_21](start_span)ccache -M "${{ env.CCACHE_MAXSIZE }}"[span_21](end_span)
          [span_22](start_span)ccache -o compression=true[span_22](end_span)

      - name: 添加KernelSU
        id: ksu_version
        run: |
          cd kernel_workspace
          [span_23](start_span)if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then[span_23](end_span)
            [span_24](start_span)curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin[span_24](end_span)
            # 同样篡改 KSU 内部的版本显示，去掉🌸
            cd ./KernelSU
            [span_25](start_span)KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/builtin/kernel/Kbuild" | grep -m1 "KSU_VERSION_API :=" | awk -F'= ' '{print $2}' | tr -d '[:space:]')[span_25](end_span)
            [span_26](start_span)[ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="3.1.7"[span_26](end_span)
            sed -i "s/-🌸//g" kernel/Kbuild
            # ... (此处保留原有KSU逻辑，但移除后缀干扰)
            [span_27](start_span)echo "ksuver=114514" >> $GITHUB_OUTPUT[span_27](end_span)
          fi

      - name: 添加 KSU & 其他配置项
        run: |
          cd kernel_workspace
          [span_28](start_span)echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig[span_28](end_span)
          # 关键：彻底关闭内核自动版本后缀
          echo "CONFIG_LOCALVERSION=\"\"" >> ./common/arch/arm64/configs/gki_defconfig
          [span_29](start_span)echo "CONFIG_LOCALVERSION_AUTO=n" >> ./common/arch/arm64/configs/gki_defconfig[span_29](end_span)
          [span_30](start_span)sed -i 's/check_defconfig//' ./common/build.config.gki[span_30](end_span)
          
      - name: 构建内核
        run: |
          WORKDIR="$(pwd)"
          [span_31](start_span)export PATH="/usr/lib/ccache:$PATH"[span_31](end_span)
          [span_32](start_span)export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"[span_32](end_span)
          [span_33](start_span)export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"[span_33](end_span)
          
          # 传入自定义后缀环境变量
          export KERNEL_SUFFIX="${{ github.event.inputs.kernel_suffix }}"
          
          cd kernel_workspace/common
          [span_34](start_span)wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfakestat.so[span_34](end_span)
          [span_35](start_span)wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfaketimeMT.so[span_35](end_span)
          [span_36](start_span)chmod 777 ./*.so[span_36](end_span)
          
          SO_DIR=$(pwd)
          [span_37](start_span)export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"[span_37](end_span)
          
          [span_38](start_span)echo '#!/bin/bash' > cc-wrapper[span_38](end_span)
          [span_39](start_span)echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper[span_39](end_span)
          [span_40](start_span)echo 'ccache clang "$@"' >> cc-wrapper[span_40](end_span)
          chmod +x cc-wrapper
          
          [span_41](start_span)sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL &[span_41](end_span)
          [span_42](start_span)make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 gki_defconfig &&[span_42](end_span)
          [span_43](start_span)make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 Image[span_43](end_span)

      - name: 克隆 AnyKernel3 并打包
        run: |
          cd kernel_workspace
          [span_44](start_span)git clone https://github.com/cctv18/AnyKernel3 --depth=1[span_44](end_span)
          cd AnyKernel3
          [span_45](start_span)cp ../common/out/arch/arm64/boot/Image ./Image[span_45](end_span)
          [span_46](start_span)zip -r ../Final_Kernel.zip ./*[span_46](end_span)

      - name: 上传 ZIP 工件
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_ZIP_Artifacts
          [span_47](start_span)path: ${{ github.workspace }}/kernel_workspace/*.zip[span_47](end_span)
