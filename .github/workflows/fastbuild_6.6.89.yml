[span_0](start_span)Name: 加速版构建 6.6.89 欧加真OKI内核[span_0](end_span)

env:
  [span_1](start_span)TZ: Asia/Shanghai[span_1](end_span)
  [span_2](start_span)ANDROID_VERSION: 'android15'[span_2](end_span)
  [span_3](start_span)KERNEL_VERSION: '6.6'[span_3](end_span)
  [span_4](start_span)KERNEL_NAME: ''[span_4](end_span)

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        [span_5](start_span)description: 'KernelSU分支(SukiSU Ultra/ReSukiSU/KernelSU Next/MKSU/KSU(原版)/无内置KSU,默认SukiSU Ultra)'[span_5](end_span)
        [span_6](start_span)required: true[span_6](end_span)
        [span_7](start_span)type: choice[span_7](end_span)
        [span_8](start_span)default: 'sukisu'[span_8](end_span)
        options:
          - [span_9](start_span)'sukisu'[span_9](end_span)
          - [span_10](start_span)'resukisu'[span_10](end_span)
          - [span_11](start_span)'ksunext'[span_11](end_span)
          - [span_12](start_span)'mksu'[span_12](end_span)
          - [span_13](start_span)'ksu'[span_13](end_span)
          - [span_14](start_span)'none'[span_14](end_span)
      custom_ksu_version:
        description: '🔢 自定义 SukiSU 数字版本号 (例如: 15000) - 留空则自动获取'
        required: false
        default: ''
      custom_ksu_version_full:
        description: '📝 自定义 SukiSU 完整版本字符串 (例如: v3.2.0-custom) - 留空则自动获取'
        required: false
        default: ''
      susfs_enable:
        [span_15](start_span)description: '是否开启susfs(用于增强隐藏环境挂载功能; 可能轻微增加耗电，上游更新导致不稳定时或不需要可关闭)'[span_15](end_span)
        [span_16](start_span)required: true[span_16](end_span)
        [span_17](start_span)type: boolean[span_17](end_span)
        [span_18](start_span)default: 'true'[span_18](end_span)
      kpm_enable:
        [span_19](start_span)description: '是否开启kpm(builtin-使用(re)sukisu内置kpm, kpn-使用独立kpm实现(支持任意KSU/面具环境); 不需要可保持默认关闭)'[span_19](end_span)
        [span_20](start_span)required: true[span_20](end_span)
        [span_21](start_span)type: choice[span_21](end_span)
        [span_22](start_span)default: 'true'[span_22](end_span)
        options:
          - [span_23](start_span)'false'[span_23](end_span)
          - [span_24](start_span)'builtin'[span_24](end_span)
          - [span_25](start_span)'kpn'[span_25](end_span)
      lz4_enable:
        [span_26](start_span)description: '是否安装 lz4 1.10.0+zstd 1.5.7 补丁及 LZ4KD 补丁'[span_26](end_span)
        [span_27](start_span)required: true[span_27](end_span)
        [span_28](start_span)type: boolean[span_28](end_span)
        [span_29](start_span)default: 'true'[span_29](end_span)
      lz4kd_enable:
        [span_30](start_span)description: '是否安装 LZ4KD 补丁(若已开启lz4+zstd补丁则可不开启)'[span_30](end_span)
        [span_31](start_span)required: true[span_31](end_span)
        [span_32](start_span)type: boolean[span_32](end_span)
        [span_33](start_span)default: 'true'[span_33](end_span)
      bbr_enable:
        [span_34](start_span)description: "是否启用bbr算法(优化上行数据,对手机日用无太大意义甚至可能负优化;false关闭,true仅加入算法,default启用算法并设为默认)"[span_34](end_span)
        [span_35](start_span)required: true[span_35](end_span)
        [span_36](start_span)type: choice[span_36](end_span)
        [span_37](start_span)default: 'true'[span_37](end_span)
        options:
          - [span_38](start_span)'false'[span_38](end_span)
          - [span_39](start_span)'true'[span_39](end_span)
          - [span_40](start_span)'default'[span_40](end_span)
      better_net:
        [span_41](start_span)description: '是否开启网络功能拓展配置(用于为ipset及需要iptables等高级网络功能内核支持的程序提供支持)'[span_41](end_span)
        [span_42](start_span)required: true[span_42](end_span)
        [span_43](start_span)type: boolean[span_43](end_span)
        [span_44](start_span)default: 'true'[span_44](end_span)
      adios_enable:
        [span_45](start_span)description: '是否启用ADIOS IO调度器支持(提升IO读写性能)'[span_45](end_span)
        [span_46](start_span)required: true[span_46](end_span)
        [span_47](start_span)type: boolean[span_47](end_span)
        [span_48](start_span)default: 'true'[span_48](end_span)
      rekernel_enable:
        [span_49](start_span)description: '是否启用Re-Kernel支持(与Freezer/NoActive等软件配合, 提升应用冻结能力)'[span_49](end_span)
        [span_50](start_span)required: true[span_50](end_span)
        [span_51](start_span)type: boolean[span_51](end_span)
        [span_52](start_span)default: 'true'[span_52](end_span)
      baseband_guard:
        [span_53](start_span)description: '是否开启内核级基带保护(阻止一切对非用户分区的写入，有效防止格机)'[span_53](end_span)
        [span_54](start_span)required: true[span_54](end_span)
        [span_55](start_span)type: boolean[span_55](end_span)
        [span_56](start_span)default: 'true'[span_56](end_span)
      ccache_debug:
        [span_57](start_span)description: '是否上传 Ccache调试日志(用于调试, 无需要不必开启)'[span_57](end_span)
        [span_58](start_span)required: true[span_58](end_span)
        [span_59](start_span)type: boolean[span_59](end_span)
        [span_60](start_span)default: 'false'[span_60](end_span)
      kernel_suffix:
        [span_61](start_span)description: '内核后缀(留空默认,开头别加连字符,勿加空格等影响指令运行的保留字符)'[span_61](end_span)
        [span_62](start_span)required: false[span_62](end_span)
        [span_63](start_span)type: string[span_63](end_span)
        [span_64](start_span)default: '🌈'[span_64](end_span)

jobs:
  build:
    [span_65](start_span)runs-on: ubuntu-latest[span_65](end_span)
    outputs:
      [span_66](start_span)ksuver: ${{ steps.ksu_version.outputs.ksuver }}[span_66](end_span)
    steps:
      - [span_67](start_span)name: 安装环境依赖+初始化源码仓库及llvm-Clang18工具链[span_67](end_span)
        run: |
          [span_68](start_span)rm -rf kernel_workspace[span_68](end_span)
          [span_69](start_span)mkdir kernel_workspace[span_69](end_span)
          [span_70](start_span)cd kernel_workspace[span_70](end_span)
          [span_71](start_span)sudo apt-mark hold firefox &&[span_71](end_span)
          [span_72](start_span)sudo apt-mark hold libc-bin &&[span_72](end_span)
          [span_73](start_span)sudo apt purge man-db &&[span_73](end_span)
          [span_74](start_span)sudo rm -rf /var/lib/man-db/auto-update &&[span_74](end_span)
          [span_75](start_span)sudo apt update &&[span_75](end_span)
          [span_76](start_span)sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache &[span_76](end_span)
          [span_77](start_span)echo "正在克隆源码仓库..."[span_77](end_span)
          [span_78](start_span)aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip &&[span_78](end_span)
          [span_79](start_span)unzip -q common.zip &&[span_79](end_span)
          [span_80](start_span)mv "android_kernel_common_oneplus_sm8750-oneplus-sm8750_v_16.0.0_oneplus_13_6.6.89" common &&[span_80](end_span)
          [span_81](start_span)rm -rf common.zip &[span_81](end_span)
          [span_82](start_span)echo "正在克隆llvm-clang18工具链..." &&[span_82](end_span)
          [span_83](start_span)mkdir -p clang18 &&[span_83](end_span)
          [span_84](start_span)aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip &&[span_84](end_span)
          [span_85](start_span)unzip -q clang.zip -d clang18 &&[span_85](end_span)
          [span_86](start_span)rm -rf clang.zip &[span_86](end_span)
          [span_87](start_span)echo "正在克隆构建工具..." &&[span_87](end_span)
          [span_88](start_span)aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip &&[span_88](end_span)
          [span_89](start_span)unzip -q build-tools.zip &&[span_89](end_span)
          [span_90](start_span)rm -rf build-tools.zip &[span_90](end_span)
          [span_91](start_span)wait[span_91](end_span)
          [span_92](start_span)echo "所有源码及llvm-Clang18工具链初始化完成！"[span_92](end_span)
          [span_93](start_span)echo "正在去除 ABI 保护 & 去除 dirty 后缀..."[span_93](end_span)
          [span_94](start_span)rm common/android/abi_gki_protected_exports_* || true[span_94](end_span)
          [span_95](start_span)for f in common/scripts/setlocalversion; do[span_95](end_span)
            [span_96](start_span)sed -i 's/ -dirty//g' "$f"[span_96](end_span)
            [span_97](start_span)sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"[span_97](end_span)
          [span_98](start_span)done[span_98](end_span)

      - [span_99](start_span)name: 配置ccache目录[span_99](end_span)
        run: |
          [span_100](start_span)echo "CCACHE_DIR=$HOME/.ccache_6.6.89" >> $GITHUB_ENV[span_100](end_span)
          [span_101](start_span)echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV[span_101](end_span)
          [span_102](start_span)echo "当前磁盘空间："[span_102](end_span)
          [span_103](start_span)df -h[span_103](end_span)
          [span_104](start_span)echo "当前构建内核版本：6.6.89"[span_104](end_span)

      - [span_105](start_span)name: 载入当前版本内核的 ccache缓存[span_105](end_span)
        [span_106](start_span)uses: actions/cache@v4[span_106](end_span)
        [span_107](start_span)id: ccache-restore[span_107](end_span)
        with:
          [span_108](start_span)path: ${{ env.CCACHE_DIR }}[span_108](end_span)
          [span_109](start_span)key: ccache-neov4-6.6.89-${{ runner.os }}-main[span_109](end_span)
          [span_110](start_span)restore-keys: |[span_110](end_span)
            [span_111](start_span)ccache-neov4-6.6.89-${{ runner.os }}-[span_111](end_span)
            [span_112](start_span)ccache-neov4-6.6.89-[span_112](end_span)
      
      - [span_113](start_span)name: 初始化并配置ccache[span_113](end_span)
        run: |
          [span_114](start_span)export CCACHE_COMPILERCHECK="none"[span_114](end_span)
          [span_115](start_span)export CCACHE_BASEDIR="${{ github.workspace }}"[span_115](end_span)
          [span_116](start_span)export CCACHE_NOHASHDIR="true"[span_116](end_span)
          [span_117](start_span)export CCACHE_HARDLINK="true"[span_117](end_span)
          [span_118](start_span)export CCACHE_DIR="${{ env.CCACHE_DIR }}"[span_118](end_span)
          [span_119](start_span)export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"[span_119](end_span)
          [span_120](start_span)mkdir -p "$CCACHE_DIR"[span_120](end_span)
          [span_121](start_span)echo "配置ccache缓存大小为: $CCACHE_MAXSIZE"[span_121](end_span)
          [span_122](start_span)ccache -M "$CCACHE_MAXSIZE"[span_122](end_span)
          [span_123](start_span)ccache -o compression=true[span_123](end_span)
          [span_124](start_span)echo "ccache初始状态:"[span_124](end_span)
          [span_125](start_span)ccache -s[span_125](end_span)
          [span_126](start_span)if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then[span_126](end_span)
            [span_127](start_span)echo "ccache缓存命中详情:"[span_127](end_span)
            [span_128](start_span)ccache -sv[span_128](end_span)
          [span_129](start_span)fi[span_129](end_span)

      - [span_130](start_span)name: 添加KernelSU[span_130](end_span)
        [span_131](start_span)id: ksu_version[span_131](end_span)
        run: |
          [span_132](start_span)cd kernel_workspace[span_132](end_span)
          [span_133](start_span)if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then[span_133](end_span)
            [span_134](start_span)echo "正在配置SukiSU Ultra..."[span_134](end_span)
            [span_135](start_span)curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin[span_135](end_span)
            [span_136](start_span)cd ./KernelSU[span_136](end_span)
            [span_137](start_span)GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)[span_137](end_span)
            [span_138](start_span)echo "当前提交哈希: $GIT_COMMIT_HASH"[span_138](end_span)
            [span_139](start_span)export KSU_VERSION=$KSU_VERSION[span_139](end_span)
            [span_140](start_span)for i in {1..3}; do[span_140](end_span)
              [span_141](start_span)KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Kbuild" | grep -m1 "KSU_VERSION_API :=" | awk -F'= ' '{print $2}' | tr -d '[:space:]')[span_141](end_span)
              [span_142](start_span)[ -n "$KSU_API_VERSION" ] && break || sleep 1[span_142](end_span)
            [span_143](start_span)done[span_143](end_span)
            [span_144](start_span)[ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="3.1.7"[span_144](end_span)
            [span_145](start_span)echo "KSU_API_VERSION=$KSU_API_VERSION" >> $GITHUB_ENV[span_145](end_span)
            
            if [ -n "${{ github.event.inputs.custom_ksu_version_full }}" ]; then
              FINAL_KSU_VERSION_FULL="${{ github.event.inputs.custom_ksu_version_full }}"
              echo "CUSTOM_KSU_VERSION_FULL_ARG=KSU_VERSION_FULL=\"$FINAL_KSU_VERSION_FULL\"" >> $GITHUB_ENV
            else
              FINAL_KSU_VERSION_FULL="v${KSU_API_VERSION}-${GIT_COMMIT_HASH}-🌸"
              echo "CUSTOM_KSU_VERSION_FULL_ARG=" >> $GITHUB_ENV
            fi

            [span_146](start_span)VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'-🌸\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := '"$FINAL_KSU_VERSION_FULL"[span_146](end_span)
            [span_147](start_span)sed -i '/define get_ksu_version_full/,/endef/d' kernel/Kbuild[span_147](end_span)
            [span_148](start_span)sed -i '/KSU_VERSION_API :=/d' kernel/Kbuild[span_148](end_span)
            [span_149](start_span)sed -i '/KSU_VERSION_FULL :=/d' kernel/Kbuild[span_149](end_span)
            [span_150](start_span)awk -v def="$VERSION_DEFINITIONS" '/REPO_OWNER :=/ {print; print def; inserted=1; next} 1 END {if (!inserted) print def}' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild[span_150](end_span)
            
            if [ -n "${{ github.event.inputs.custom_ksu_version }}" ]; then
              KSU_VERSION="${{ github.event.inputs.custom_ksu_version }}"
              echo "CUSTOM_KSU_VERSION_ARG=KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
            else
              [span_151](start_span)KSU_VERSION=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)[span_151](end_span)
              echo "CUSTOM_KSU_VERSION_ARG=" >> $GITHUB_ENV
            fi
            [span_152](start_span)echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV[span_152](end_span)
            [span_153](start_span)echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT[span_153](end_span)
            [span_154](start_span)grep -A10 "REPO_OWNER" kernel/Kbuild[span_154](end_span)
            [span_155](start_span)grep "KSU_VERSION_FULL" kernel/Kbuild[span_155](end_span)
            [span_156](start_span)echo "SukiSU版本号: $FINAL_KSU_VERSION_FULL"[span_156](end_span)
          [span_157](start_span)elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then[span_157](end_span)
            [span_158](start_span)echo "正在配置ReSukiSU..."[span_158](end_span)
            [span_159](start_span)curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s builtin[span_159](end_span)
            [span_160](start_span)cd ./KernelSU[span_160](end_span)
            [span_161](start_span)GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)[span_161](end_span)
            [span_162](start_span)echo "当前提交哈希: $GIT_COMMIT_HASH"[span_162](end_span)
            [span_163](start_span)export KSU_VERSION=$KSU_VERSION[span_163](end_span)
            [span_164](start_span)for i in {1..3}; do[span_164](end_span)
              [span_165](start_span)KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/builtin/kernel/Kbuild" | grep -m1 "KSU_VERSION_API :=" | awk -F'= ' '{print $2}' | tr -d '[:space:]')[span_165](end_span)
              [span_166](start_span)[ -n "$KSU_API_VERSION" ] && break || sleep 1[span_166](end_span)
            [span_167](start_span)done[span_167](end_span)
            [span_168](start_span)[ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="3.1.7"[span_168](end_span)
            [span_169](start_span)echo "KSU_API_VERSION=$KSU_API_VERSION" >> $GITHUB_ENV[span_169](end_span)

            if [ -n "${{ github.event.inputs.custom_ksu_version_full }}" ]; then
              FINAL_KSU_VERSION_FULL="${{ github.event.inputs.custom_ksu_version_full }}"
              echo "CUSTOM_KSU_VERSION_FULL_ARG=KSU_VERSION_FULL=\"$FINAL_KSU_VERSION_FULL\"" >> $GITHUB_ENV
            else
              FINAL_KSU_VERSION_FULL="v${KSU_API_VERSION}-${GIT_COMMIT_HASH}-🌸"
              echo "CUSTOM_KSU_VERSION_FULL_ARG=" >> $GITHUB_ENV
            fi

            [span_170](start_span)VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'-🌸\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := '"$FINAL_KSU_VERSION_FULL"[span_170](end_span)
            [span_171](start_span)sed -i '/define get_ksu_version_full/,/endef/d' kernel/Kbuild[span_171](end_span)
            [span_172](start_span)sed -i '/KSU_VERSION_API :=/d' kernel/Kbuild[span_172](end_span)
            [span_173](start_span)sed -i '/KSU_VERSION_FULL :=/d' kernel/Kbuild[span_173](end_span)
            [span_174](start_span)awk -v def="$VERSION_DEFINITIONS" '/REPO_OWNER :=/ {print; print def; inserted=1; next} 1 END {if (!inserted) print def}' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild[span_174](end_span)
            
            if [ -n "${{ github.event.inputs.custom_ksu_version }}" ]; then
              KSU_VERSION="${{ github.event.inputs.custom_ksu_version }}"
              echo "CUSTOM_KSU_VERSION_ARG=KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
            else
              [span_175](start_span)KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)[span_175](end_span)
              echo "CUSTOM_KSU_VERSION_ARG=" >> $GITHUB_ENV
            fi
            [span_176](start_span)echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV[span_176](end_span)
            [span_177](start_span)echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT[span_177](end_span)
            [span_178](start_span)grep -A10 "REPO_OWNER" kernel/Kbuild[span_178](end_span)
            [span_179](start_span)grep "KSU_VERSION_FULL" kernel/Kbuild[span_179](end_span)
            [span_180](start_span)echo "ReSukiSU版本号: $FINAL_KSU_VERSION_FULL"[span_180](end_span)
          [span_181](start_span)elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then[span_181](end_span)
            [span_182](start_span)echo "正在配置KernelSU Next..."[span_182](end_span)
            [span_183](start_span)curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs[span_183](end_span)
            [span_184](start_span)cd KernelSU-Next[span_184](end_span)
            [span_185](start_span)rm -rf .git[span_185](end_span)
            [span_186](start_span)KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/pershoot/KernelSU-Next/commits?sha=dev&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)[span_186](end_span)
