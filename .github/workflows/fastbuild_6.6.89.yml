name: Build_oneplus_sm8750
on:
  workflow_dispatch:
    inputs:
      REPO_MANIFEST:
        description: "请选择要编译的机型："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_13t'
        default: 'oneplus_13'

      keep_original_settings:
        description: "保持原内核名称及构建时间"
        required: false
        default: false
        type: boolean

      custom_kernel_suffix:
        description: "✏️ 自定义内核名称(示例:-TG@qdykernel) - 仅在取消勾选'保持原设置'时有效"
        required: false
        default: ''
      
      custom_kernel_time:
        description: "⏰ 自定义构建时间(示例:Tue Dec 17 23:36:49 UTC 2024) - 仅在取消勾选'保持原设置'时有效"
        required: false
        default: ''
      
      enable_feature_x:
        description: "生成无KPM的AK3 - 取消则只有有KPM的AK3"
        required: false
        default: true
        type: boolean
        
      enable_feature_y:
        description: "lz4kd"
        required: false
        default: true
        type: boolean
        
      enable_feature_z:
        description: "风驰"
        required: false
        default: true
        type: boolean

      custom_ksu_version:
        description: "🔢 自定义 SukiSU 数字版本号 (例如: 15000) - 留空则自动获取"
        required: false
        default: ''
        type: string
      custom_ksu_version_full:
        description: "📝 自定义 SukiSU 完整版本字符串 (例如: v3.2.0-custom@mybranch) - 留空则自动获取"
        required: false
        default: ''
        type: string
      
jobs:
  build:
    name: Build_${{ github.event.inputs.REPO_MANIFEST }}
    runs-on: ubuntu-latest
    steps:
      - name: Check disk space
        run: |
          echo "构建前磁盘空间："
          df -h
      
      - name: Set REPO_MANIFEST
        id: set_manifest
        run: |
          case "${{ github.event.inputs.REPO_MANIFEST }}" in
            oneplus_13)
              echo "REPO_MANIFEST=JiuGeFaCai_oneplus_13_v" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_13" >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo "REPO_MANIFEST=JiuGeFaCai_oneplus_13t_v" >> $GITHUB_ENV
              echo "DEVICES_NAME=oneplus_13t" >> $GITHUB_ENV
              ;;
          esac

      - name: Set KERNEL_TIME
        id: set_kernel_time
        run: |
          KEEP_ORIGINAL="${{ github.event.inputs.keep_original_settings }}"
          CUSTOM_TIME="${{ github.event.inputs.custom_kernel_time }}"
          DEVICES_NAME="${{ env.DEVICES_NAME }}"

          if [ "$KEEP_ORIGINAL" = "false" ] && [ -n "$CUSTOM_TIME" ]; then
            echo "使用自定义构建时间: $CUSTOM_TIME"
            echo "KERNEL_TIME=$CUSTOM_TIME" >> $GITHUB_ENV
          else
            case "$DEVICES_NAME" in
              oneplus_13)
                echo 'KERNEL_TIME=Tue Dec 17 23:36:49 UTC 2024' >> $GITHUB_ENV
                ;;
              oneplus_13t)
                echo 'KERNEL_TIME=FriApr 25 01:56:53 UTC 2025' >> $GITHUB_ENV
                ;;
            esac
          fi

      - name: Set device-specific CCACHE_DIR
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${REPO_MANIFEST}" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config --global user.name "girlforsweet"
          git config --global user.email "3522417359@gmail.com"

      - name: Configure APT caching
        run: |
          APT_CACHE_DIR="$HOME/apt-cache"
          mkdir -p "$APT_CACHE_DIR"/{archives,lists/partial}
          echo "Dir::Cache \"$APT_CACHE_DIR\";" | sudo tee /etc/apt/apt.conf.d/90user-cache
          echo "Dir::Cache::archives \"$APT_CACHE_DIR/archives\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          echo "Dir::State::lists \"$APT_CACHE_DIR/lists\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          echo "Acquire::Check-Valid-Until \"false\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          echo "Acquire::Languages \"none\";" | sudo tee -a /etc/apt/apt.conf.d/90user-cache
          sudo chown -R $USER:$USER "$APT_CACHE_DIR"

      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: ${{ env.HOME }}/apt-cache
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/Build_oneplus_sm8750.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install dependencies
        run: |
          sudo rm -f /var/lib/apt/lists/lock /var/lib/dpkg/lock
          APT_CACHE_DIR="$HOME/apt-cache"
          mkdir -p "$APT_CACHE_DIR/lists/partial"
          sudo apt -o Dir::Cache="$APT_CACHE_DIR" update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt -o Dir::Cache="$APT_CACHE_DIR" install -yq --no-install-recommends \
            python3 git curl ccache libelf-dev \
            build-essential flex bison libssl-dev \
            libncurses-dev liblz4-tool zlib1g-dev \
            libxml2-utils rsync unzip
          
          echo "✅ 依赖安装完成"
          
      - name: Restore ccache
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref }}-${{ env.REPO_MANIFEST }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.REPO_MANIFEST }}-
            ccache-${{ runner.os }}-

      - name: Init ccache
        run: |
          export CCACHE_COMPILERCHECK="%compiler% -dumpmachine; %compiler% -dumpversion"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="8G"

          INIT_FLAG="$CCACHE_DIR/.ccache_initialized"
          if command -v ccache >/dev/null 2>&1; then
            if [ ! -f "$INIT_FLAG" ]; then
              echo "初始化 ccache ($CCACHE_DIR)..."
              mkdir -p "$CCACHE_DIR"
              ccache -M "$CCACHE_MAXSIZE"
              touch "$INIT_FLAG"
            else
              echo "ccache 已初始化，跳过"
            fi
          else
            echo "未安装 ccache，跳过"
          fi


      - name: Install repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/showdo/kernel_manifest.git -b refs/heads/oneplus/sm8750 -m ${REPO_MANIFEST}.xml --depth=1
          repo --trace sync -c -j$(nproc --all) --no-tags
          rm kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"
          rm kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports!"
          
      - name: Set up SukiSU Ultra and Calculate SukiSU Version (for Artifacts & Build)
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/susfs-main/kernel/setup.sh" | bash -s susfs-main
          
          cd ./KernelSU # Navigate into KernelSU directory for version calculation

          REPO_OWNER="SukiSU-Ultra"
          REPO_NAME="SukiSU-Ultra"
          REPO_BRANCH="main"
          KSU_VERSION_API="3.1.7"
          
          # --- Determine KSU_VERSION for Artifact Naming and potential Makefile override ---
          FINAL_KSU_VERSION=""
          FINAL_KSU_VERSION_FULL=""

          # Check for custom input
          CUSTOM_KSU_NUMERIC_INPUT="${{ github.event.inputs.custom_ksu_version }}"
          CUSTOM_KSU_FULL_INPUT="${{ github.event.inputs.custom_ksu_version_full }}"

          if [ -n "$CUSTOM_KSU_NUMERIC_INPUT" ]; then
              FINAL_KSU_VERSION="$CUSTOM_KSU_NUMERIC_INPUT"
              echo "使用自定义 SukiSU 数字版本号: $FINAL_KSU_VERSION"
              echo "CUSTOM_KSU_VERSION_ARG=KSU_VERSION=$FINAL_KSU_VERSION" >> $GITHUB_ENV
          else
              # Fallback to Makefile's numeric version calculation logic
              LOCAL_GIT_EXISTS=$(test -d .git && echo 1 || echo 0)
              if [ "$LOCAL_GIT_EXISTS" -eq 1 ]; then
                  git fetch --unshallow || true
              fi

              KSU_GITHUB_VERSION_COMMIT=$(curl -sI "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/commits?sha=${REPO_BRANCH}&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p' || true)

              if [ -n "$KSU_GITHUB_VERSION_COMMIT" ]; then
                FINAL_KSU_VERSION=$(expr 10000 + "$KSU_GITHUB_VERSION_COMMIT" + 700)
                echo "SukiSU numeric version (GitHub API): $FINAL_KSU_VERSION"
              elif [ "$LOCAL_GIT_EXISTS" -eq 1 ]; then
                KSU_LOCAL_VERSION=$(git rev-list --count main)
                FINAL_KSU_VERSION=$(expr 10000 + "$KSU_LOCAL_VERSION" + 700)
                echo "SukiSU numeric version (local Git): $FINAL_KSU_VERSION"
              else
                FINAL_KSU_VERSION=13000
                echo "WARNING: Could not fetch SukiSU numeric version. Using fallback: $FINAL_KSU_VERSION"
              fi
              echo "CUSTOM_KSU_VERSION_ARG=" >> $GITHUB_ENV # No override needed for make
          fi
          
          echo "KSUVER=$FINAL_KSU_VERSION" >> $GITHUB_ENV # Set for artifact names


          # --- Determine KSU_VERSION_FULL for Artifact Naming and potential Makefile override ---
          if [ -n "$CUSTOM_KSU_FULL_INPUT" ]; then
              FINAL_KSU_VERSION_FULL="$CUSTOM_KSU_FULL_INPUT"
              echo "使用自定义 SukiSU 完整版本字符串: $FINAL_KSU_VERSION_FULL"
              echo "CUSTOM_KSU_VERSION_FULL_ARG=KSU_VERSION_FULL=\"$FINAL_KSU_VERSION_FULL\"" >> $GITHUB_ENV
          else
              # Fallback to Makefile's full version calculation logic
              KSU_GITHUB_VERSION=$(curl -s "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases/latest" | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/' || true)

              get_ksu_version_full_string() {
                local base_version="$1"
                local short_hash=$(git rev-parse --short=8 HEAD || echo "unknown")
                local branch_name=$(git rev-parse --abbrev-ref HEAD || echo "unknown")
                echo "v${base_version}-${short_hash}@${branch_name}"
              }

              if [ -n "$KSU_GITHUB_VERSION" ]; then
                FINAL_KSU_VERSION_FULL=$(get_ksu_version_full_string "$KSU_GITHUB_VERSION")
                echo "SukiSU full version (GitHub Release): $FINAL_KSU_VERSION_FULL"
              elif [ "$LOCAL_GIT_EXISTS" -eq 1 ]; then
                FINAL_KSU_VERSION_FULL=$(get_ksu_version_full_string "$KSU_VERSION_API")
                echo "SukiSU full version (local Git API): $FINAL_KSU_VERSION_FULL"
              else
                FINAL_KSU_VERSION_FULL="v${KSU_VERSION_API}-${REPO_NAME}-unknown@unknown"
                echo "WARNING: Could not fetch SukiSU full version. Using fallback: $FINAL_KSU_VERSION_FULL"
              fi
              echo "CUSTOM_KSU_VERSION_FULL_ARG=" >> $GITHUB_ENV # No override needed for make
          fi

          echo "KSU_VERSION_FULL_ARTIFACT=$FINAL_KSU_VERSION_FULL" >> $GITHUB_ENV # Set for possible artifact name enhancement or logging

          # The SukiSU Kernel/Makefile dynamically sets DKSU_VERSION and DKSU_VERSION_FULL
          # based on its own shell commands. Therefore, we do NOT need to modify it via sed.
          # The line `sed -i "s/DKSU_VERSION=12800/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile`
          # from previous iterations is removed as it's likely redundant or incorrect with the current Makefile.

          cd ../../.. # Go back to original workspace root
          
      - name: Search SukiSU Version String in Source
        run: |
          cd kernel_workspace/kernel_platform/KernelSU
          grep -r -E 'version|release|build|name|git\ rev|git\ describe' . | tee SukiSU_version_search_log.txt || true
          echo "搜索完成，结果已保存到 SukiSU_version_search_log.txt 文件。"
          cd ../../..
          mkdir -p diagnostics
          cp kernel_workspace/kernel_platform/KernelSU/SukiSU_version_search_log.txt diagnostics/
          ls -R diagnostics
      
      - name: Upload SukiSU Version Search Log
        uses: actions/upload-artifact@v4
        with:
          name: SukiSU_Version_Search_Log
          path: diagnostics/SukiSU_version_search_log.txt
        
      - name: Set up SUSFS
        run: |
            cd kernel_workspace
            git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6
            git clone https://github.com/SukiSU-Ultra/SukiSU_patch.git

            cd kernel_platform          
            cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/
            cp ../susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/

            cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./common/include/linux
            cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./common/lib
            cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./common/crypto
            cp -r ../SukiSU_patch/other/zram/lz4k_oplus ./common/lib/

            cd ./common

            if [ "${REPO_MANIFEST}" != "oneplus_13t" ] && [ "${REPO_MANIFEST}" != "oneplus_ace5_ultra" ]; then
             sed -i 's/-32,12 +32,38/-32,11 +32,37/g' 50_add_susfs_in_gki-android15-6.6.patch
             sed -i '/#include <trace\/hooks\/fs.h>/d' 50_add_susfs_in_gki-android15-6.6.patch
            fi

            patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
            cp ../../SukiSU_patch/hooks/syscall_hooks.patch ./
            patch -p1 -F 3 < syscall_hooks.patch

            echo "完成"

      - name: Cache HMBird patch
        uses: actions/cache@v3
        with:
          path: ${{ runner.temp }}/hmbird_patch.c
          key: hmbird-patch-v1
          restore-keys: |
            hmbird-patch-v1
            
      - name: Apply HMBird GKI patch
        run: |
          PATCH_FILE="${{ runner.temp }}/hmbird_patch.c"
          if [ ! -f "$PATCH_FILE" ]; then
            echo "下载HMBird补丁..."
            curl -sSLo "$PATCH_FILE" https://raw.githubusercontent.com/showdo/build_oneplus_sm8750/main/hmbird_patch.c
          fi
          
          cd kernel_workspace/kernel_platform/common/drivers
          cp "$PATCH_FILE" hmbird_patch.c
          
          if ! grep -q "hmbird_patch.o" Makefile; then
            echo "obj-y += hmbird_patch.o" >> Makefile
          fi
          echo "HMBird补丁应用完成"

          
      - name: Apply lz4kd Patches
        if: ${{inputs.enable_feature_y }}
        run: |
          cd kernel_workspace/kernel_platform/common
          cp ../../SukiSU_patch/other/zram/zram_patch/6.6/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true
          
      - name: Set gki_defconfig
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig

          echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CRYPTO_ZSTD=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_F2FS_FS_COMPRESSION=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_LZ4=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_F2FS_FS_ZSTD=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_KERNEL_LZ4=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig

          echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BIC=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_CUBIC=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_WESTWOOD=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_HTCP=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig
          
          sudo sed -i 's/check_defconfig//' ./common/build.config.gki
          cd common
          git add -A && git commit -a -m "BUILD Kernel"

      - name: Set Kernel name
        env:
          REPO_MANIFEST: ${{ github.event.inputs.REPO_MANIFEST }}
          KEEP_ORIGINAL: ${{ github.event.inputs.keep_original_settings }}
          CUSTOM_SUFFIX: ${{ github.event.inputs.custom_kernel_suffix }}
        run: |
          cd kernel_workspace/kernel_platform

          case "$DEVICES_NAME" in
            oneplus_13)
              DEFAULT_SUFFIX="-android15-8-g013ec21bba94-abogki383916444-4k"
              ;;
            oneplus_13t)
              DEFAULT_SUFFIX="-android15-8-gba3bcfd39307-abogki413159095-4k"
              ;;
          esac
          
          echo "当前机型: $DEVICES_NAME"
          echo "保持原设置: $KEEP_ORIGINAL"
          echo "自定义后缀: $CUSTOM_SUFFIX"
          echo "默认后缀: $DEFAULT_SUFFIX"
          
          if [ "$KEEP_ORIGINAL" = "false" ]; then
            if [ -n "$CUSTOM_SUFFIX" ]; then
              DEFAULT_SUFFIX="$CUSTOM_SUFFIX"
              echo "使用自定义内核名称: $DEFAULT_SUFFIX"
            else
              echo "使用机型默认内核名称: $DEFAULT_SUFFIX"
            fi
          else
            echo "保持原内核名称设置"
          fi
          ESCAPED_SUFFIX=$(printf '%s\n' "$DEFAULT_SUFFIX" | sed 's:[\/&]:\\&:g')
          sudo sed -i "s/-4k/$ESCAPED_SUFFIX/g" ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
          
      - name: Add sched_ext
        if: ${{inputs.enable_feature_z }}
        run: |
          cd kernel_workspace/kernel_platform/
          git clone https://github.com/HanKuCha/sched_ext.git
          cp -r ./sched_ext/* ./common/kernel/sched
          rm -rf ./sched_ext/.git
          cd common/kernel/sched  

      - name: Build Kernel
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928/bin:$PATH"
          
          export CCACHE_COMPILERCHECK="%compiler% -dumpmachine; %compiler% -dumpversion"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="8G"
          
          export KBUILD_BUILD_TIMESTAMP="${KERNEL_TIME}"
          
          sudo apt install -y libelf-dev
          
          cd kernel_workspace/kernel_platform/common
          
          # Pass custom KSU_VERSION and KSU_VERSION_FULL if they were provided in inputs
          # These will override the variables defined in KernelSU/kernel/Makefile for the C macros
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole LD=ld.lld HOSTLD=ld.lld O=out KCFLAGS+=-O2 \
            ${{ env.CUSTOM_KSU_VERSION_ARG }} ${{ env.CUSTOM_KSU_VERSION_FULL_ARG }} \
            gki_defconfig
          
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole LD=ld.lld HOSTLD=ld.lld O=out KCFLAGS+=-O2 \
            ${{ env.CUSTOM_KSU_VERSION_ARG }} ${{ env.CUSTOM_KSU_VERSION_FULL_ARG }} \
            Image
          
      - name: Make AnyKernel3 (NoKPM)
        if: ${{inputs.enable_feature_x }}
        run: |
          git clone https://github.com/showdo/AnyKernel3.git --depth=1 AnyKernel3_NoKPM
          rm -rf ./AnyKernel3_NoKPM/.git
          rm -rf ./AnyKernel3_NoKPM/push.sh
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image ./AnyKernel3_NoKPM/
      
      
      - name: Upload AnyKernel3
        if: ${{inputs.enable_feature_x }}
        uses: actions/upload-artifact@v4
        with:
          name: AK3_NoKPM_${{ env.KSUVER }}_${{ env.DEVICES_NAME }}_SuKiSU
          path: ./AnyKernel3_NoKPM/*

      - name: Apply KPM Patch
        run: |
          cd kernel_workspace/kernel_platform/common/out/arch/arm64/boot
          curl -LO https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.12.0/patch_linux
          chmod +x patch_linux
          ./patch_linux
          rm -f Image
          mv oImage Image
          
      - name: Make AnyKernel3 (KPM)
        run: |
          git clone https://github.com/showdo/AnyKernel3.git --depth=1  
          rm -rf ./AnyKernel3/.git
          rm -rf ./AnyKernel3/push.sh
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image ./AnyKernel3/

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AK3_KPM_${{ env.KSUVER }}_${{ env.DEVICES_NAME }}_SuKiSU
          path: ./AnyKernel3/*
          
      - name: Post-build disk check
        run: |
          echo "构建后磁盘空间："
          df -h
