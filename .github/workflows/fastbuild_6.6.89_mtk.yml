name: 加速版构建 6.6.89 欧加真OKI内核

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  KERNEL_NAME: ''

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        required: true
        type: choice
        default: 'sukisu'
        options:
          - 'sukisu'
          - 'resukisu'
          - 'ksunext'
          - 'mksu'
          - 'ksu'
          - 'none'
      custom_ksu_version:
        required: false
        default: ''
      custom_ksu_version_full:
        required: false
        default: ''
      susfs_enable:
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        required: true
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        required: true
        type: boolean
        default: 'true'
      lz4kd_enable:
        required: true
        type: boolean
        default: 'true'
      bbr_enable:
        required: true
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        required: true
        type: boolean
        default: 'true'
      adios_enable:
        required: true
        type: boolean
        default: 'true'
      rekernel_enable:
        required: true
        type: boolean
        default: 'true'
      baseband_guard:
        required: true
        type: boolean
        default: 'true'
      ccache_debug:
        required: true
        type: boolean
        default: 'false'
      kernel_suffix:
        required: false
        type: string
        default: '🌈'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
    steps:
      - name: 初始化环境
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          sudo apt-mark hold firefox && sudo apt-mark hold libc-bin && sudo apt purge man-db && sudo rm -rf /var/lib/man-db/auto-update && sudo apt update && sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache &
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip && unzip -q common.zip && mv "android_kernel_common_oneplus_sm8750-oneplus-sm8750_v_16.0.0_oneplus_13_6.6.89" common && rm -rf common.zip &
          mkdir -p clang18 && aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip && unzip -q clang.zip -d clang18 && rm -rf clang.zip &
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip && unzip -q build-tools.zip && rm -rf build-tools.zip &
          wait
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: 配置ccache
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_6.6.89" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV

      - name: 载入缓存
        uses: actions/cache@v4
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-neov4-6.6.89-${{ runner.os }}-main
          restore-keys: |
            ccache-neov4-6.6.89-${{ runner.os }}-
      
      - name: 初始化并配置ccache
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          ccache -s

      - name: 添加KernelSU
        id: ksu_version
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} != "none" ]]; then
            [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]] && URL="https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh"
            [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]] && URL="https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh"
            [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]] && URL="https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh"
            [[ ${{ github.event.inputs.ksu_type }} == "mksu" ]] && URL="https://raw.githubusercontent.com/5ec1cff/KernelSU/refs/heads/main/kernel/setup.sh"
            [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]] && URL="https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh"
            [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]] && curl -LSs "$URL" | bash -s dev-susfs || curl -LSs "$URL" | bash -s builtin || curl -LSs "$URL" | bash -s main
            
            KSU_DIR=$(ls -d KernelSU* | head -n 1)
            cp -r ./"$KSU_DIR" ./common/drivers/kernelsu
            grep -q "kernelsu" common/drivers/Makefile || echo "obj-y += kernelsu/" >> common/drivers/Makefile
            
            cd ./"$KSU_DIR"
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD 2>/dev/null || echo "00000000")
            KSU_API_VERSION=$(grep -m1 "KSU_VERSION_API :=" kernel/Kbuild | awk -F'= ' '{print $2}' | tr -d '[:space:]' || echo "3.1.7")
            
            if [ -n "${{ github.event.inputs.custom_ksu_version_full }}" ]; then
              VERSION_FULL_VAL="${{ github.event.inputs.custom_ksu_version_full }}"
            else
              VERSION_FULL_VAL="v${KSU_API_VERSION}-${GIT_COMMIT_HASH}-🌸"
            fi
            echo "CUSTOM_KSU_VERSION_FULL_ARG=KSU_VERSION_FULL=\"$VERSION_FULL_VAL\"" >> $GITHUB_ENV
            
            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'-🌸\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := '"$VERSION_FULL_VAL"
            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Kbuild
            sed -i '/KSU_VERSION_API :=/d' kernel/Kbuild
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Kbuild
            awk -v def="$VERSION_DEFINITIONS" '/REPO_OWNER :=/ {print; print def; inserted=1; next} 1 END {if (!inserted) print def}' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild
            cp kernel/Kbuild ../common/drivers/kernelsu/kernel/Kbuild
            
            if [ -n "${{ github.event.inputs.custom_ksu_version }}" ]; then
              KSU_VERSION="${{ github.event.inputs.custom_ksu_version }}"
            else
              KSU_VERSION=$(expr $(git rev-list --count HEAD 2>/dev/null || echo 0) + 30000)
            fi
            echo "CUSTOM_KSU_VERSION_ARG=KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: 应用内核补丁
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} != "none" ]]; then
            git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
            wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            if [[ -d ./common/drivers/kernelsu ]]; then
                cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./common/drivers/kernelsu/
                cd ./common/drivers/kernelsu
                sed -i 's|kernel/Makefile|kernel/Kbuild|g' 10_enable_susfs_for_ksu.patch
                patch -p1 < 10_enable_susfs_for_ksu.patch || true
                [[ ${{ github.event.inputs.ksu_type }} == "mksu" ]] && { wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/mksu_supercalls.patch; patch -p1 < mksu_supercalls.patch || true; }
                cd ../../..
            fi
            cd ./common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]] && sed -i 's|vma = find_vma(mm|struct vm_area_struct *&|' ./fs/proc/task_mmu.c
            patch -p1 < 69_hide_stuff.patch || true
          fi

      - name: 构建内核
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$WORKDIR/kernel_workspace/clang18/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          cd kernel_workspace/common
          echo "CONFIG_KSU=y" >> ./arch/arm64/configs/gki_defconfig
          [[ ${{ github.event.inputs.susfs_enable }} == "true" ]] && { echo "CONFIG_KSU_SUSFS=y" >> ./arch/arm64/configs/gki_defconfig; echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./arch/arm64/configs/gki_defconfig; }
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfakestat.so
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfaketimeMT.so
          chmod 777 ./*.so
          export PRELOAD_LIBS="$(pwd)/libfakestat.so $(pwd)/libfaketimeMT.so"
          echo -e '#!/bin/bash\nexport LD_PRELOAD="'$PRELOAD_LIBS'"\nexport FAKESTAT="2025-05-25 12:00:00"\nexport FAKETIME="@2025-05-25 13:00:00"\nccache clang "$@"' > cc-wrapper
          echo -e '#!/bin/bash\nexport LD_PRELOAD="'$PRELOAD_LIBS'"\nexport FAKESTAT="2025-05-25 12:00:00"\nexport FAKETIME="@2025-05-25 13:00:00"\nld.lld "$@"' > ld-wrapper
          chmod +x cc-wrapper ld-wrapper
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/other_patch/config.patch && patch -p1 -F 3 < config.patch || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc &
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out ${{ env.CUSTOM_KSU_VERSION_ARG }} ${{ env.CUSTOM_KSU_VERSION_FULL_ARG }} Image

      - name: 打包镜像
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          [[ -f Image ]] || exit 1
          zip -r ../AnyKernel3_Build_${{ env.KSUVER }}.zip ./*
      
      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_ZIP
          path: kernel_workspace/*.zip
